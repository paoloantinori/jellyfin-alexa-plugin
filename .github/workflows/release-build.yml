name: release build

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        run: echo "VERSION="$(grep -oP "(?<=<Version>)[^<]+" Directory.Build.props) >> $GITHUB_OUTPUT

      - name: Check if tag and project version matches
        if: startsWith(github.ref, 'refs/tags/')
        run: if ! diff <(echo "${GITHUB_REF##*/}") <(echo "${{ steps.version.outputs.VERSION }}"); then exit 1; fi

      - name: Setup .NET SDK 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Build
        run: dotnet publish --configuration Release

      - name: Test
        run: dotnet test --verbosity normal

      - name: Create zip
        run: |
          cd Jellyfin.Plugin.AlexaSkill/bin/Release/net9.0/publish
          cp ${GITHUB_WORKSPACE}/Jellyfin.Plugin.AlexaSkill/icon.png .
          zip -j ${GITHUB_WORKSPACE}/AlexaSkill_${{ steps.version.outputs.VERSION }}.zip \
            Alexa.NET.dll \
            Alexa.NET.Management.dll \
            Amazon.Lambda.Core.dll \
            Amazon.Lambda.Serialization.Json.dll \
            Jellyfin.Plugin.AlexaSkill.dll \
            Refit.dll \
            icon.png

      - name: Create github release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          files: AlexaSkill_${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: false

      - name: Add release to repo manifest
        run: python3 .github/workflows/add_release_to_manifest.py ${{ steps.version.outputs.VERSION }} AlexaSkill_${{ steps.version.outputs.VERSION }}.zip

      - name: Commit manifest changes
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Added new release to repo manifest"

      - name: Push manifest changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
