# Template-based intents. Each template uses {vocab_name} references that get
# expanded via Cartesian product. Slot references like {song} are preserved.
#
# Templates produce: for each template string, substitute each vocab reference
# with each value from that vocabulary list (Cartesian product).
templates:
  PlaySongIntent:
    templates:
      - "{imperative} {song_noun} {song}"
      - "{infinitive} {song_noun} {song}"
      - "{imperative} {song} {artist_article} {musician}"
      - "{infinitive} {song} {artist_article} {musician}"
    slots:
      - name: song
        type: AMAZON.MusicRecording
      - name: musician
        type: AMAZON.Musician

  PlayAlbumIntent:
    templates:
      - "{imperative} {album_noun} {album}"
      - "{infinitive} {album_noun} {album}"
      - "{imperative} {album_noun} {album} {artist_article} {musician}"
      - "{infinitive} {album_noun} {album} {artist_article} {musician}"
    slots:
      - name: album
        type: AlbumName
      - name: musician
        type: AMAZON.Musician

  PlayArtistSongsIntent:
    templates:
      - "{imperative} {media_noun} {artist_article} {musician}"
      - "{infinitive} {media_noun} {artist_article} {musician}"
    slots:
      - name: musician
        type: AMAZON.Musician

  PlayLastAddedIntent:
    templates:
      - "{imperative} {last_added_phrase}"
      - "{infinitive} {last_added_phrase}"
      - "{imperative} {last_added_time_phrase}"
      - "{infinitive} {last_added_time_phrase}"
    slots:
      - name: media_type
        type: MediaType
      - name: time_period
        type: TimePeriod

  PlayFavoritesIntent:
    templates:
      - "{imperative} {favorites_noun}"
      - "{infinitive} {favorites_noun}"
    slots:
      - name: media_type
        type: MediaType
