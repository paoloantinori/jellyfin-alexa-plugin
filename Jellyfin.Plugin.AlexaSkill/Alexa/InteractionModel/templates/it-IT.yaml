# Italian interaction model templates for Alexa skill.
#
# Vocabulary sets are expanded via Cartesian product into utterance samples.
# Slot references like {song} are preserved as-is (not expanded).
# To add a new verb (e.g. "Ascolta"), just add it to the imperative/infinitive lists.
#
# Run: python scripts/generate_interaction_model.py it-IT

invocationName: mia collezione

vocabulary:
  imperative: [Riproduci, Suona, Metti, Pleia]
  infinitive: [Di riprodurre, Di suonare, Di mettere, Di pleiare]

  song_noun: [il brano, la canzone, il pezzo, la traccia]
  album_noun: [album, disco]
  artist_article: [di, dei, degli, delle]
  media_noun: [brani, canzoni, musica, un brano, una canzone, un pezzo, una traccia]
  favorites_noun: [i miei preferiti, "{media_type} preferiti"]
  last_added_phrase: ["novità {media_type}", "ultimi {media_type} aggiunti", "nuovi media"]
  last_added_time_phrase: ["{media_type} aggiunti {time_period}", "novità {media_type} {time_period}", "{media_type} {time_period}"]
  time_period_val: [oggi, "questa settimana", "questo mese"]

# Intents that are fully static (no templates). Listed here so the generator
# knows to preserve them from the base JSON if present.
static_intents:
  - AMAZON.CancelIntent
  - AMAZON.HelpIntent
  - AMAZON.StopIntent
  - AMAZON.FallbackIntent
  - AMAZON.PauseIntent
  - AMAZON.ResumeIntent
  - AMAZON.NextIntent
  - AMAZON.PreviousIntent
  - AMAZON.YesIntent
  - AMAZON.NoIntent
  - AMAZON.ShuffleOnIntent
  - AMAZON.ShuffleOffIntent
  - AMAZON.StartOverIntent

