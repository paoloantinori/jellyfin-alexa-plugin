locale: en-US
invocation_name: jellyfin player
tests:
  # NOTE: simulate-skill for en-US resolves most utterances to built-in Amazon
  # skills (Music, Video, etc.) rather than this custom skill. These tests are
  # retained for profile-nlu validation but may fail in simulate-skill mode.
  # Use it-IT E2E fixtures for reliable simulate-skill testing.

  # --- Playback intents ---
  - utterance: "play happy music"
    expected_intent: PlayMoodMusicIntent
    expected_slots:
      mood: {}
    expected_response_type: any

  - utterance: "play random rock songs"
    expected_intent: PlayRandomIntent
    expected_slots:
      genre: {}
      media_type: {}
    expected_response_type: any

  - utterance: "play songs added this week"
    expected_intent: PlayLastAddedIntent
    expected_slots:
      media_type: {}
      time_period: {}
    expected_response_type: any

  # --- Info queries (speech-only responses) ---
  - utterance: "what is currently playing"
    expected_intent: MediaInfoIntent
    expected_slots: {}
    expected_response_type: any

  - utterance: "what's in progress"
    expected_intent: InProgressMediaListIntent
    expected_slots: {}
    expected_response_type: any

  # --- State change intents ---
  - utterance: "I like this song"
    expected_intent: MarkFavoriteIntent
    expected_slots: {}
    expected_response_type: any

  - utterance: "continue watching"
    expected_intent: ContinueWatchingIntent
    expected_slots: {}
    expected_response_type: any

  # --- Queue management ---
  - utterance: "what's up next"
    expected_intent: ListQueueIntent
    expected_slots: {}
    expected_response_type: any
