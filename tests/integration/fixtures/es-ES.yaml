  - utterance: "reproduce los simpson temporada uno episodio uno"
    expected_intent: PlayEpisodeIntent
    expected_slots:
      series_name: {}
      season_number: {}
      episode_number: {}

  # -------------------------------------------------------------------------
  # 19. BrowseLibraryIntent (browse_category)
  # -------------------------------------------------------------------------
  - utterance: "explorar películas"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}

  - utterance: "muéstrame álbumes"
