locale: en-US
invocation_name: jellyfin player
tests:
  # -------------------------------------------------------------------------
  # 1. LoopSongOnIntent (no slots)
  # -------------------------------------------------------------------------
  - utterance: "loop this song"
    expected_intent: LoopSongOnIntent
    expected_slots: {}

  - utterance: "Repeat the song"
    expected_intent: LoopSongOnIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 2. PlayChannelIntent (channel)
  # -------------------------------------------------------------------------
  - utterance: "Play channel bbc radio"
    expected_intent: PlayChannelIntent
    expected_slots:
      channel: {}

  - utterance: "Play radio jazz fm"
    expected_intent: PlayChannelIntent
    expected_slots:
      channel: {}

  # -------------------------------------------------------------------------
  # 3. PlaySongIntent (song, musician)
  # -------------------------------------------------------------------------
  # AMAZON.MusicRecording may not recognize specific song names
  - utterance: "Play the song bohemian rhapsody"
    expected_intent: PlaySongIntent
    expected_slots: {}

  - utterance: "Play the song hotel california from the eagles"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}
      musician: {}

  # Combined song + musician slot pattern with multi-word artist
  # NOTE: bare "play X by Y" is ambiguous with PlayArtistSongsIntent ("play {musician}").
  # Adding "the song" qualifier forces NLU to PlaySongIntent which has
  # "play the song {song} by {musician}" as a dedicated sample.
  - utterance: "play the song bohemian rhapsody by queen"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}
      musician: {}

  # -------------------------------------------------------------------------
  # 4. PlayAlbumIntent (album, musician)
  # -------------------------------------------------------------------------
  - utterance: "Play the album dark side of the moon"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}

  - utterance: "Play the album thriller by michael jackson"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}
      musician: {}

  # "play album by artist" combined pattern
  - utterance: "play album abbey road by the beatles"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}
      musician: {}

  # -------------------------------------------------------------------------
  # 5. PlayVideoIntent (title)
