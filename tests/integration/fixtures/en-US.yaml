      musician: {}

  - utterance: "Play music from the beatles"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}

  # "play songs by" / "play music by" patterns with multi-word artist names
  - utterance: "play songs by radiohead"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}

  - utterance: "play music by the rolling stones"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}

