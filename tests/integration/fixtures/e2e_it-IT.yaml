locale: it-IT
invocation_name: mia collezione
tests:
  # --- Playback intents ---
  - utterance: "riproduci i miei preferiti"
    expected_intent: PlayFavoritesIntent
    expected_slots:
      media_type: {}
    expected_response_type: any

  - utterance: "suonare musica rilassante"
    expected_intent: PlayMoodMusicIntent
    expected_slots:
      mood: {}
    expected_response_type: any

  - utterance: "riprodurre brani a caso"
    expected_intent: PlayRandomIntent
    expected_slots:
      media_type: {}
    expected_response_type: any

  # --- Playback controls ---
  - utterance: "pausa"
    expected_intent: AMAZON.PauseIntent
    expected_slots: {}
    expected_response_type: any

  # --- State change intents ---
  - utterance: "aggiungi ai preferiti"
    expected_intent: MarkFavoriteIntent
    expected_slots: {}
    expected_response_type: any

  # --- Play by artist (in-memory index) ---
  # Exact match
  - utterance: "metti una canzone dei soul coughing"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # Truncation — "soul coughin" without the g (ASR truncation)
  - utterance: "metti una canzone dei soul coughin"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # Exact match — different artist
  - utterance: "suona i pink floyd"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # Misspelling — "pink floid" (typo: y→i) — NLU may not resolve heavy misspellings
  # Skipping: Alexa NLU cannot route this to any intent. Fuzzy matching is tested at unit level.
  # - utterance: "suona i pink floid"
  #   expected_intent: PlayArtistSongsIntent
  #   expected_slots:
  #     musician: {}
  #   expected_response_type: any

  # Multi-word prefix — "led zep" truncated (Led Zeppelin)
  - utterance: "metti i led zep"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # Different artist — The Beatles (multi-word with "The" prefix)
  - utterance: "metti una canzone dei beatles"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # Not found — artist that doesn't exist in the library
  - utterance: "metti una canzone dei xyzzyfoo"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # --- Disambiguation carrier phrases (band/gruppo/cantante) ---
  # "band" carrier — disambiguates from PlayRadioIntent
  - utterance: "suona la band radiohead"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # "gruppo" carrier — Italian for "group"
  - utterance: "metti il gruppo pink floyd"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # "cantante" carrier — Italian for "singer"
  - utterance: "ascolta il cantante soul coughing"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # --- Search ---
  - utterance: "cerca il brano bohemian rhapsody"
    expected_intent: SearchMediaIntent
    expected_slots:
      query: {}
    expected_response_type: any

  # --- Play specific song (carrier phrase stripping) ---
  # "Suona la canzone {song}" — NLU may include "la canzone" in the slot value;
  # the handler strips it before searching. NLU slot resolution may truncate the
  # value (e.g. "sugar free ja"), so response_type is "any" — the handler logic
  # is verified via the simulator endpoint instead.
  - utterance: "suona la canzone sugar free jazz"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}
    expected_response_type: any

  # "Metti il brano {song}" — alternative carrier phrase variant
  - utterance: "metti il brano sugar free jazz"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}
    expected_response_type: any

  # --- Browse / Library ---
  # Browse albums (uses English plural "albums" per it-IT model)
  - utterance: "elenca albums"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}
    expected_response_type: any

  # Browse books — regression guard for "mostra libri" slot resolution
  - utterance: "mostra libri"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}
    expected_response_type: any

  # In-progress media
  - utterance: "cosa stavo guardando"
    expected_intent: InProgressMediaListIntent
    expected_slots: {}
    expected_response_type: any

  # Recently added
  - utterance: "cosa c'è di nuovo"
    expected_intent: QueryRecentlyAddedIntent
    expected_slots: {}
    expected_response_type: any

  # List queue
  - utterance: "mostra la coda"
    expected_intent: ListQueueIntent
    expected_slots: {}
    expected_response_type: any

  # Recommend music
  - utterance: "consiglia musica"
    expected_intent: RecommendIntent
    expected_slots:
      media_type: {}
    expected_response_type: any

  # --- Play specific song (carrier phrase stripping) ---
  - utterance: "suona la canzone bohemian rhapsody"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}
    expected_response_type: any

  # --- Play album ---
  - utterance: "riproduci album thriller"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}
    expected_response_type: any

  # --- Pause (regression guard for stop/pause routing fix) ---
  - utterance: "pausa"
    expected_intent: AMAZON.PauseIntent
    expected_slots: {}
    expected_response_type: any

  # --- Mark favorite ---
  - utterance: "aggiungi ai preferiti"
    expected_intent: MarkFavoriteIntent
    expected_slots: {}
    expected_response_type: any

  # --- Resume ---
  # NOTE: ResumeIntent requires audio to be playing. simulate-skill sends isolated
  # requests without session continuity, so this may not resolve correctly.
  # Kept as a regression guard — if SMAPI can't route it, the failure documents
  # the limitation rather than being silently untested.
  - utterance: "riprendi"
    expected_intent: AMAZON.ResumeIntent
    expected_slots: {}
    expected_response_type: any
