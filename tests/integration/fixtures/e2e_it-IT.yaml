locale: it-IT
invocation_name: mia collezione
tests:
  # --- Playback intents ---
  - utterance: "riproduci i miei preferiti"
    expected_intent: PlayFavoritesIntent
    expected_slots: {}
    expected_response_type: any

  - utterance: "suonare musica rilassante"
    expected_intent: PlayMoodMusicIntent
    expected_slots:
      mood: {}
    expected_response_type: any

  - utterance: "riprodurre brani a caso"
    expected_intent: PlayRandomIntent
    expected_slots:
      media_type: {}
    expected_response_type: any

  # --- Playback controls ---
  - utterance: "pausa"
    expected_intent: AMAZON.PauseIntent
    expected_slots: {}
    expected_response_type: any

  # --- State change intents ---
  - utterance: "aggiungi ai preferiti"
    expected_intent: MarkFavoriteIntent
    expected_slots: {}
    expected_response_type: any

  # --- Play by artist (in-memory index) ---
  # Exact match
  - utterance: "metti una canzone dei soul coughing"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # Truncation — "soul coughin" without the g (ASR truncation)
  - utterance: "metti una canzone dei soul coughin"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # Exact match — different artist
  - utterance: "suona i pink floyd"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # Misspelling — "pink floid" (typo: y→i) — NLU may not resolve heavy misspellings
  # Skipping: Alexa NLU cannot route this to any intent. Fuzzy matching is tested at unit level.
  # - utterance: "suona i pink floid"
  #   expected_intent: PlayArtistSongsIntent
  #   expected_slots:
  #     musician: {}
  #   expected_response_type: any

  # Multi-word prefix — "led zep" truncated (Led Zeppelin)
  - utterance: "metti i led zep"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # Different artist — The Beatles (multi-word with "The" prefix)
  - utterance: "metti una canzone dei beatles"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # Not found — artist that doesn't exist in the library
  - utterance: "metti una canzone dei xyzzyfoo"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # --- Disambiguation carrier phrases (band/gruppo/cantante) ---
  # "band" carrier — disambiguates from PlayRadioIntent
  - utterance: "suona la band radiohead"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # "gruppo" carrier — Italian for "group"
  - utterance: "metti il gruppo pink floyd"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # "cantante" carrier — Italian for "singer"
  - utterance: "ascolta il cantante soul coughing"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # --- Search ---
  - utterance: "cerca il brano bohemian rhapsody"
    expected_intent: SearchMediaIntent
    expected_slots:
      query: {}
    expected_response_type: any

  # --- Play specific song (carrier phrase stripping) ---
  # "Suona la canzone {song}" — NLU may include "la canzone" in the slot value;
  # the handler strips it before searching. NLU slot resolution may truncate the
  # value (e.g. "sugar free ja"), so response_type is "any" — the handler logic
  # is verified via the simulator endpoint instead.
  - utterance: "suona la canzone sugar free jazz"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}
    expected_response_type: any

  # "Metti il brano {song}" — alternative carrier phrase variant
  - utterance: "metti il brano sugar free jazz"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}
    expected_response_type: any

  # --- Browse / Library ---
  # Browse albums (uses English plural "albums" per it-IT model)
  - utterance: "elenca albums"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}
    expected_response_type: any

  # Browse film (verb + article + category)
  - utterance: "elenca i film"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}
    expected_response_type: any

  # Browse serie (different verb variant)
  - utterance: "sfoglia le serie"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}
    expected_response_type: any

  # Browse artisti (no article variant)
  - utterance: "mostra artisti"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}
    expected_response_type: any

  # Browse canzoni (question form)
  - utterance: "quali canzoni abbiamo"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}
    expected_response_type: any

  # Browse generi (question form)
  - utterance: "che generi ci sono"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}
    expected_response_type: any

  # "mostra libri" routes correctly via profile-nlu (BrowseLibraryIntent + browse_category=libri)
  # but goes to FallbackIntent in simulate-skill (different NLU engine).
  # Tested in NLU fixtures instead.

  # In-progress media
  - utterance: "cosa stavo guardando"
    expected_intent: InProgressMediaListIntent
    expected_slots: {}
    expected_response_type: any

  # Recently added
  - utterance: "cosa c'è di nuovo"
    expected_intent: QueryRecentlyAddedIntent
    expected_slots: {}
    expected_response_type: any

  # List queue
  - utterance: "mostra la coda"
    expected_intent: ListQueueIntent
    expected_slots: {}
    expected_response_type: any

  # Recommend music
  - utterance: "consiglia musica"
    expected_intent: RecommendIntent
    expected_slots:
      media_type: {}
    expected_response_type: any

  # --- Play specific song (carrier phrase stripping) ---
  - utterance: "suona la canzone bohemian rhapsody"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}
    expected_response_type: any

  # --- Play album ---
  # "thriller" triggers Amazon-side competition (video/music associations); use a less
  # ambiguous album name that routes cleanly to PlayAlbumIntent.
  - utterance: "riproduci album jazz cafe"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}
    expected_response_type: any

  # --- Play by playlist (issue #10 regression coverage) ---
  # Playlist members are linked children, not ParentId-owned rows; the handler must
  # resolve them via Playlist.GetManageableItems() or the playlist reports empty.
  # Requires these playlists in the linked Jellyfin library:
  #   "mad season" (≥1 audio track) — proves a real playlist plays (not "vuota")
  #   "pearl jam soft" (0 tracks) — proves a genuinely-empty playlist still reports empty
  #
  # response_type is "any" (not directive/speech) because simulate-skill does not expose
  # the skill's directives/outputSpeech in the shape _parse_skill_response walks — the
  # same reason every other entry here uses "any". The play-vs-empty distinction is
  # verified via the plugin Simulator endpoint AND server logs:
  #   mad season    -> "resolved 8 audio tracks … returning AudioPlayer"
  #   pearl jam soft -> "resolved 0 audio tracks" -> "La playlist è vuota"
  # This e2e guards NLU routing to PlayPlaylistIntent and that the skill doesn't hard-error.
  - utterance: "riproduci la playlist mad season"
    expected_intent: PlayPlaylistIntent
    expected_slots:
      playlist: {}
    expected_response_type: any

  - utterance: "riproduci la playlist pearl jam soft"
    expected_intent: PlayPlaylistIntent
    expected_slots:
      playlist: {}
    expected_response_type: any

  # --- ShufflePlayIntent (JF-305): shuffle-at-start playlist ---
  # "mad season" is a real, searchable playlist (≥1 audio track) — same target as
  # the PlayPlaylist case above. Verifies NLU routes to ShufflePlayIntent and the
  # skill serves playback (shuffled first track) without hard-erroring.
  - utterance: "mescola la playlist mad season"
    expected_intent: ShufflePlayIntent
    expected_slots:
      playlist: {}
    expected_response_type: any

  # --- Italian mood: literal samples in it-IT model ---
  # These match static (non-slotted) samples in the model. The handler receives
  # an empty mood slot and responds with "DidNotCatchMood" which lists Italian
  # mood words. The full mood→genre chain is verified via the Simulator endpoint
  # (which bypasses NLU) since AMAZON.SearchQuery is unreliable in simulate-skill.

  # "Musica per cena" — literal sample → handler gets empty mood → prompt
  - utterance: "musica per cena"
    expected_intent: PlayMoodMusicIntent
    expected_slots: {}
    expected_response_type: any

  # "Musica per allenamento" — literal sample → handler gets empty mood → prompt
  - utterance: "musica per allenamento"
    expected_intent: PlayMoodMusicIntent
    expected_slots: {}
    expected_response_type: any

  # --- Resume ---
  # NOTE: ResumeIntent requires audio to be playing. simulate-skill sends isolated
  # requests without session continuity, so this may not resolve correctly.
  # Kept as a regression guard — if SMAPI can't route it, the failure documents
  # the limitation rather than being silently untested.
  - utterance: "riprendi"
    expected_intent: AMAZON.ResumeIntent
    expected_slots: {}
    expected_response_type: any

  # --- FindSong: artist-scoped search ---
  - utterance: "cerca una canzone dei police"
    expected_intent: FindSongByArtistIntent
    expected_slots:
      musician: {}
    expected_response_type: any

  # --- FindSong: keyword-only search ---
  # No artist in the utterance — FindSongIntent is correct (not FindSongByArtistIntent).
  - utterance: "trova una canzone chiamata bohemian rhapsody"
    expected_intent: FindSongIntent
    expected_slots: {}
    expected_response_type: any

  # --- FindSong: bare invocation (no slots) ---
  # NLU matches FindSongIntent (has exact static sample "cerca una canzone").
  - utterance: "cerca una canzone"
    expected_intent: FindSongIntent
    expected_slots: {}
    expected_response_type: any
