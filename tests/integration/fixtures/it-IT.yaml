    expected_slots: {}

  - utterance: "Non mi piace più"
    expected_intent: UnmarkFavoriteIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 11. MediaInfoIntent (media_info_type)
  # -------------------------------------------------------------------------
  - utterance: "Cosa sta suonando"
    expected_intent: MediaInfoIntent
    expected_slots: {}

  - utterance: "Che brano è questo"
    expected_intent: MediaInfoIntent
    expected_slots: {}

  - utterance: "Chi canta questa canzone"
    expected_intent: MediaInfoIntent
