locale: it-IT
invocation_name: jellyfin player
tests:
  # -------------------------------------------------------------------------
  # 1. LoopAllOffIntent (no slots)
  # -------------------------------------------------------------------------
  - utterance: "Disattiva loop"
    expected_intent: LoopAllOffIntent
    expected_slots: {}

  - utterance: "Disattiva ripetizione"
    expected_intent: LoopAllOffIntent
    expected_slots: {}

