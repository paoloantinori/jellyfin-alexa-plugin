  # "Che genere è" may not match a MediaInfoType value — slot may be empty
  - utterance: "Che genere è"
    expected_intent: MediaInfoIntent
    expected_slots: {}

  # "Parlami dell'artista" — not a templated sample with slot, slot may be empty
  - utterance: "Parlami dell'artista"
    expected_intent: MediaInfoIntent
    expected_slots: {}

  # "Che anno è" may not match a MediaInfoType value — slot may be empty
  - utterance: "Che anno è"
    expected_intent: MediaInfoIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 12. InProgressMediaListIntent (no slots)
  # -------------------------------------------------------------------------
  - utterance: "Cosa stavo guardando"
    expected_intent: InProgressMediaListIntent
    expected_slots: {}

  - utterance: "Mostrami i video in corso"
    expected_intent: InProgressMediaListIntent
    expected_slots: {}

  - utterance: "quali video non ho finito"
    expected_intent: InProgressMediaListIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 13. PlayEpisodeIntent (series_name, season_number, episode_number)
  # -------------------------------------------------------------------------
  - utterance: "Riproduci breaking bad stagione uno episodio tre"
    expected_intent: PlayEpisodeIntent
    expected_slots:
      series_name: {}
      season_number: {}
      episode_number: {}

  - utterance: "Suona stranger things stagione due episodio uno"
    expected_intent: PlayEpisodeIntent
    expected_slots:
      series_name: {}
      season_number: {}
      episode_number: {}

  # -------------------------------------------------------------------------
  # 14. BrowseLibraryIntent (browse_category)
  # -------------------------------------------------------------------------
  - utterance: "Sfoglia film"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}

  - utterance: "Mostra albums"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}

  - utterance: "Elenca generi"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}

  - utterance: "quali libri abbiamo"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}

  - utterance: "quali film ci sono"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}

  - utterance: "mostra libri"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}

  - utterance: "mostra i libri"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}

  - utterance: "mostra artisti"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}

  - utterance: "sfoglia i brani"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}

  - utterance: "elenca playlist"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}

  # Bare category — regression guard for follow-up slot resolution
  - utterance: "libri"
    expected_intent: BrowseLibraryIntent
    expected_slots:
      browse_category: {}

  # -------------------------------------------------------------------------
  # 15. RecommendIntent (media_type)
  # -------------------------------------------------------------------------
  - utterance: "Consiglia un film"
    expected_intent: RecommendIntent
    expected_slots:
      media_type: {}

  # "Suggerisci una canzone" matches literal sample — no slot captured
  - utterance: "Suggerisci una canzone"
    expected_intent: RecommendIntent
    expected_slots: {}

  - utterance: "cosa mi consigli"
    expected_intent: RecommendIntent
    expected_slots: {}

  - utterance: "consigliami qualcosa"
    expected_intent: RecommendIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 16. SleepTimerIntent (duration_minutes)
  # -------------------------------------------------------------------------
  - utterance: "Imposta timer trenta"
    expected_intent: SleepTimerIntent
    expected_slots:
      duration_minutes: {}

  - utterance: "Ferma dopo sessanta"
    expected_intent: SleepTimerIntent
    expected_slots:
      duration_minutes: {}

  # -------------------------------------------------------------------------
  # 17. PlayMoodMusicIntent (mood)
  # -------------------------------------------------------------------------
  - utterance: "Musica felice"
    expected_intent: PlayMoodMusicIntent
    expected_slots:
      mood: {}

  # Literal samples — mood slot not captured
  - utterance: "Musica rilassante"
    expected_intent: PlayMoodMusicIntent
    expected_slots: {}

  - utterance: "Musica mattutina"
    expected_intent: PlayMoodMusicIntent
    expected_slots: {}

  - utterance: "Musica per cena"
    expected_intent: PlayMoodMusicIntent
    expected_slots: {}

  # JF-355: new Spotify-aligned Mood slot values (sleep, energetic)
  - utterance: "Musica per dormire"
    expected_intent: PlayMoodMusicIntent
    expected_slots:
      mood: {}

  - utterance: "Musica energica"
    expected_intent: PlayMoodMusicIntent
    expected_slots:
      mood: {}

  # -------------------------------------------------------------------------
  # 18. PlayRandomIntent (media_type)
  # -------------------------------------------------------------------------
  - utterance: "Riproduci film casuali"
    expected_intent: PlayRandomIntent
    expected_slots:
      media_type: {}

  - utterance: "Suona brani a caso"
    expected_intent: PlayRandomIntent
    expected_slots:
      media_type: {}

  # -------------------------------------------------------------------------
  # 19. ContinueWatchingIntent (no slots)
  # -------------------------------------------------------------------------
  - utterance: "Continua a guardare"
    expected_intent: ContinueWatchingIntent
    expected_slots: {}

  - utterance: "Riprendi il video"
    expected_intent: ContinueWatchingIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 20. LearnMyVoiceIntent (no slots)
  # -------------------------------------------------------------------------
  - utterance: "Impara la mia voce"
    expected_intent: LearnMyVoiceIntent
    expected_slots: {}

  - utterance: "Riconoscimi"
    expected_intent: LearnMyVoiceIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 21. WhoAmIIntent (no slots)
  # -------------------------------------------------------------------------
  - utterance: "Chi sono"
    expected_intent: WhoAmIIntent
    expected_slots: {}

  - utterance: "Che utente sono"
    expected_intent: WhoAmIIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 22. QueryArtistLibraryIntent (musician, query_type)
  # -------------------------------------------------------------------------
  - utterance: "Quali brani abbiamo dei queen"
    expected_intent: QueryArtistLibraryIntent
    expected_slots:
      musician: {}

  - utterance: "Quali album abbiamo dei pink floyd"
    expected_intent: QueryArtistLibraryIntent
    expected_slots:
      musician: {}

  # "Mostra i brani di ligabue" — "brani" is literal in sample, query_type not captured
  - utterance: "Mostra i brani di ligabue"
    expected_intent: QueryArtistLibraryIntent
    expected_slots:
      musician: {}

  # -------------------------------------------------------------------------
  # 23. PlaySongIntent (song, musician)
  # -------------------------------------------------------------------------
  - utterance: "Riproduci il brano bohemian rhapsody"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}

  - utterance: "Suona imagine di john lennon"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}
      musician: {}

  # Short-form utterances with English proper nouns
  # NOTE: bare "Suona bohemian rhapsody" is unreliable — NLU routes to PlayNextIntent
  # ("suona {song} dopo" matches more strongly). Use song_noun carrier for reliability.
  - utterance: "Suona il brano bohemian rhapsody"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}

  # "Metti hotel california" — NLU can't select an intent (competition between
  # PlaySongIntent, PlayVideoIntent, PlayArtistSongsIntent). Use explicit forms
  # like "Metti il brano hotel california" for reliable routing.

  - utterance: "Ascolta stairway to heaven"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}

  # "Riproduci yesterday" is ambiguous (NLU: no selectedIntent, considered MediaInfo/PlaySong/Recommend/SleepTimer/BrowseLibrary)
  # Short single-word song names cannot be reliably resolved; use explicit forms like "Riproduci il brano yesterday"

  - utterance: "Fai partire Comfortably Numb"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}

  # -------------------------------------------------------------------------
  # 24. PlayAlbumIntent (album, musician)
  # -------------------------------------------------------------------------
  - utterance: "Riproduci album dark side of the moon"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}

  - utterance: "Suona album thriller di michael jackson"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}
      musician: {}

  # "Di suonare" prefix patterns (invocation-prefix form)
  # NOTE: "Di suonare album abbey road" is ambiguous with PlayVideoIntent ("Di suonare {title}").
  # Even "Di suonare l'album abbey road" fails — NLU prefers the generic {title} slot.
  # Use "Fai suonare l'album {album}" instead: PlayVideoIntent has no "Fai suonare" pattern.
  - utterance: "Fai suonare l'album abbey road"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}

  - utterance: "Di suonare disco thriller"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}

  # Article-bearing album forms — what Italian users actually say
  # ("mettere l'album / il disco X"). Before the album_noun article fix these
  # routed to PlaySongIntent / no-selection (jazz cafe case, 2026-07-12).
  - utterance: "Di mettere l'album abbey road"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}

  - utterance: "Metti il disco thriller"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}

  - utterance: "Suona l'album dark side of the moon"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}

  - utterance: "Di mettere il disco rumours"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}

  # NOTE: "il cd" as an album carrier is weak (NLU routes "metti il cd X" to
  # PlaySongIntent) and album fixtures must use library-present albums (AlbumName
  # is catalog-backed post-JF-332, so "la cura"/"thriller" only resolve if the
  # user owns them). The 4 fixtures above all verify PlayAlbumIntent on the
  # deployed catalog-backed model.

  # Short-form album utterances are ambiguous — NLU resolves "Suona abbey road" to
  # no selectedIntent, "Metti thriller" and "Riproduci the wall" to PlaySongIntent.
  # Use explicit "album"/"disco" noun forms for reliable resolution (tested above).

  # -------------------------------------------------------------------------
  # 25. PlayArtistSongsIntent (musician)
  # -------------------------------------------------------------------------
  - utterance: "Suona musica dei queen"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}

  # Note: "Riproduci brani dei queen" resolves to PlayByGenreIntent in NLU.
  # The disambiguated form "Suona musica dei queen" is more reliable.

  - utterance: "Suona musica dei pink floyd"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}

  # "Di suonare" patterns (invocation-prefix form used via "chiedi a mia collezione di ...")
  - utterance: "Di suonare una canzone dei soul coughing"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}

  - utterance: "Di suonare musica dei maneskin"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}

  # "Riproduci" pattern with multi-word artist
  - utterance: "Riproduci una canzone dei ligabue"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}

  # "Metti" pattern (real-world test case)
  - utterance: "Metti una canzone dei soul coughing"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}

  # Short-form artist utterances are ambiguous — NLU resolves bare artist names
  # to various intents (MediaInfo, Fallback, PlaySong) or no selectedIntent.
  # Use explicit "musica di"/"brani di" forms for reliable resolution.

  # -------------------------------------------------------------------------
  # 26. PlayLastAddedIntent (media_type, time_period)
  # -------------------------------------------------------------------------
  - utterance: "Riproduci novità film"
    expected_intent: PlayLastAddedIntent
    expected_slots:
      media_type: {}

  - utterance: "Suona ultimi brani aggiunti"
    expected_intent: PlayLastAddedIntent
    expected_slots:
      media_type: {}

  - utterance: "Riproduci brani aggiunti questa settimana"
    expected_intent: PlayLastAddedIntent
    expected_slots:
      media_type: {}
      time_period: {}

  - utterance: "Suona musica aggiunti questo mese"
    expected_intent: PlayLastAddedIntent
    expected_slots:
      media_type: {}
      time_period: {}

  # -------------------------------------------------------------------------
  # 27. PlayFavoritesIntent (media_type)
  # -------------------------------------------------------------------------
  - utterance: "Riproduci i miei preferiti"
    expected_intent: PlayFavoritesIntent
    expected_slots: {}

  - utterance: "Suona i miei preferiti"
    expected_intent: PlayFavoritesIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 28. PlayPodcastIntent (podcast_name)
  # -------------------------------------------------------------------------
  - utterance: "Riproduci il podcast serial"
    expected_intent: PlayPodcastIntent
    expected_slots:
      podcast_name: {}

  - utterance: "Ascolta il podcast the daily"
    expected_intent: PlayPodcastIntent
    expected_slots:
      podcast_name: {}

  - utterance: "Suona il podcast radiolab"
    expected_intent: PlayPodcastIntent
    expected_slots:
      podcast_name: {}

  # -------------------------------------------------------------------------
  # 29. SearchMediaIntent (query)
  # Bare "Cerca/Trova/Hai" patterns were narrowed in JF-251 to prevent NLU
  # competition. Use media-type-qualified carriers instead.
  # -------------------------------------------------------------------------
  - utterance: "Cerca un film bohemian rhapsody"
    expected_intent: SearchMediaIntent
    expected_slots:
      query: {}

  - utterance: "Trova un film inception"
    expected_intent: SearchMediaIntent
    expected_slots:
      query: {}

  - utterance: "Hai un film breaking bad"
    expected_intent: SearchMediaIntent
    expected_slots:
      query: {}

  # -------------------------------------------------------------------------
  # 30. c'e patterns (is-there patterns)
  # These test the c'e utterances added to intent-specific samples.
  # NLU should prefer typed-slot intents over SearchMediaIntent for
  # music-related c'e queries, and route generic ones to SearchMediaIntent.
  # -------------------------------------------------------------------------
  - utterance: "c'e una canzone di radiohead"
    expected_intent: FindSongByArtistIntent
    expected_slots:
      musician: {}

  # "c'e un album chiamato {album}" now routes to PlayAlbumIntent — the
  # album-specific pattern wins over PlayArtistSongsIntent.
  - utterance: "c'e un album chiamato dark side of the moon"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}

  # "c'e un film che si chiama matrix" hits FallbackIntent — the NLU can't match
  # it to any intent reliably. SearchMediaIntent's "c'è {query}" pattern isn't
  # strong enough. Accept FallbackIntent; users should use "Cerca matrix" instead.
  - utterance: "c'e un film che si chiama matrix"
    expected_intent: AMAZON.FallbackIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 31. FindSongIntent / FindSongByArtistIntent
  # -------------------------------------------------------------------------
  - utterance: "cerca una canzone dei police"
    expected_intent: FindSongByArtistIntent
    expected_slots:
      musician: {}

  - utterance: "trova una canzone chiamata breath"
    expected_intent: FindSongIntent
    expected_slots:
      titleKeywords: {}

  - utterance: "cerca una canzone"
    expected_intent: FindSongIntent
    expected_slots: {}

  - utterance: "aiutami a trovare una canzone dei radiohead"
    expected_intent: FindSongByArtistIntent
    expected_slots:
      musician: {}

  - utterance: "voglio trovare una canzone"
    expected_intent: FindSongIntent
    expected_slots: {}

  - utterance: "cerca una canzone che parla di amore"
    expected_intent: FindSongIntent
    expected_slots:
      titleKeywords: {}

  # -------------------------------------------------------------------------
  # 32. AMAZON.* built-in intents (regression guard)
  # -------------------------------------------------------------------------
  - utterance: "ferma"
    expected_intent: AMAZON.StopIntent
    expected_slots: {}

  - utterance: "pausa"
    expected_intent: AMAZON.PauseIntent
    expected_slots: {}

  - utterance: "riprendi"
    expected_intent: AMAZON.ResumeIntent
    expected_slots: {}

  - utterance: "avanti"
    expected_intent: AMAZON.NextIntent
    expected_slots: {}

  - utterance: "indietro"
    expected_intent: AMAZON.PreviousIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 33. ShufflePlayIntent (playlist, shuffle-at-start) — JF-305
  # -------------------------------------------------------------------------
  - utterance: "Mescola la playlist rock classico"
    expected_intent: ShufflePlayIntent
    expected_slots:
      playlist: {}

  - utterance: "Riproduci la playlist rock classico in modalità casuale"
    expected_intent: ShufflePlayIntent
    expected_slots:
      playlist: {}

  - utterance: "Riproduci la playlist rock classico a caso"
    expected_intent: ShufflePlayIntent
    expected_slots:
      playlist: {}

  # Regression sentinel — plain play must stay PlayPlaylistIntent (not stolen by ShufflePlayIntent)
  - utterance: "Riproduci la playlist rock classico"
    expected_intent: PlayPlaylistIntent
    expected_slots:
      playlist: {}
