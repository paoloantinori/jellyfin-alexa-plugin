  # -------------------------------------------------------------------------
  # 5. PlayVideoIntent (title)
  # Note: PlayVideoIntent is dominated by PlaySongIntent (6 vs 64 samples).
  # All "verb + title" patterns resolve to PlaySongIntent, which is fine
  # since the skill handler determines content type from Jellyfin search.
  # -------------------------------------------------------------------------
  - utterance: "Riproduci star wars"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}

