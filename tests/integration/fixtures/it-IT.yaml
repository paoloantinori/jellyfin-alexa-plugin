locale: it-IT
invocation_name: mia collezione
tests:
  # -------------------------------------------------------------------------
  # 1. LoopAllOffIntent (no slots)
  # -------------------------------------------------------------------------
  - utterance: "Disattiva loop"
    expected_intent: LoopAllOffIntent
    expected_slots: {}

  - utterance: "Disattiva ripetizione"
    expected_intent: LoopAllOffIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 2. LoopAllOnIntent (no slots)
  # -------------------------------------------------------------------------
  - utterance: "Attiva loop"
    expected_intent: LoopAllOnIntent
    expected_slots: {}

  - utterance: "Attiva ripetizione"
    expected_intent: LoopAllOnIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 3. RepeatSingleOnIntent (no slots)
  # -------------------------------------------------------------------------
  - utterance: "Ripeti la canzone"
    expected_intent: RepeatSingleOnIntent
    expected_slots: {}

  - utterance: "Ripeti il brano"
    expected_intent: RepeatSingleOnIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 4. PlayChannelIntent (channel)
  # -------------------------------------------------------------------------
  - utterance: "Canale radio maria"
    expected_intent: PlayChannelIntent
    expected_slots:
      channel: {}

  - utterance: "Riproduci radio rtl"
    expected_intent: PlayChannelIntent
    expected_slots:
      channel: {}

  # -------------------------------------------------------------------------
  # 5. PlayVideoIntent (title)
  # Note: PlayVideoIntent is dominated by PlaySongIntent (6 vs 64 samples).
  # All "verb + title" patterns resolve to PlaySongIntent, which is fine
  # since the skill handler determines content type from Jellyfin search.
  # -------------------------------------------------------------------------
  - utterance: "Riproduci star wars"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}

  - utterance: "voglio guardare star wars"
    expected_intent: PlayVideoIntent
    expected_slots:
      title: {}

  - utterance: "fai vedere matrix"
    expected_intent: PlayVideoIntent
    expected_slots:
      title: {}

  # -------------------------------------------------------------------------
  # 6. PlayByGenreIntent (genre)
  # -------------------------------------------------------------------------
  - utterance: "Riproduci genere rock"
    expected_intent: PlayByGenreIntent
    expected_slots:
      genre: {}

  - utterance: "Suona genere jazz"
    expected_intent: PlayByGenreIntent
    expected_slots:
      genre: {}

  # -------------------------------------------------------------------------
  # 6b. PlayByDecadeIntent (decade)
  # -------------------------------------------------------------------------
  - utterance: "Riproduci musica degli anni ottanta"
    expected_intent: PlayByDecadeIntent
    expected_slots:
      decade: {}

  - utterance: "Brani degli anni ottanta"
    expected_intent: PlayByDecadeIntent
    expected_slots:
      decade: {}

  # -------------------------------------------------------------------------
  # 7. PlayPlaylistIntent (playlist)
  # -------------------------------------------------------------------------
  - utterance: "Riproduci playlist i miei brani"
    expected_intent: PlayPlaylistIntent
    expected_slots:
      playlist: {}

  - utterance: "Suona la playlist rock classico"
    expected_intent: PlayPlaylistIntent
    expected_slots:
      playlist: {}

  # -------------------------------------------------------------------------
  # 8. GoToChapterIntent (direction, chapter_number)
  # -------------------------------------------------------------------------
  - utterance: "Vai al capitolo cinque"
    expected_intent: GoToChapterIntent
    expected_slots:
      chapter_number: {}

  - utterance: "Salta al capitolo primo"
    expected_intent: GoToChapterIntent
    expected_slots:
      direction: {}

  - utterance: "Capitolo tre"
    expected_intent: GoToChapterIntent
    expected_slots:
      chapter_number: {}

  # -------------------------------------------------------------------------
  # 9. MarkFavoriteIntent (no slots)
  # -------------------------------------------------------------------------
  - utterance: "Aggiungi ai preferiti"
    expected_intent: MarkFavoriteIntent
    expected_slots: {}

  - utterance: "Mi piace"
    expected_intent: MarkFavoriteIntent
    expected_slots: {}

  - utterance: "Mi piace questa canzone"
    expected_intent: MarkFavoriteIntent
    expected_slots: {}

  - utterance: "Salva nei preferiti"
    expected_intent: MarkFavoriteIntent
    expected_slots: {}

