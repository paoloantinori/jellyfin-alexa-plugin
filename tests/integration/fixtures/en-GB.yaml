locale: en-GB
invocation_name: jellyfin player
tests:
  # -------------------------------------------------------------------------
  # 1. LoopSongOnIntent (no slots)
  # -------------------------------------------------------------------------
  - utterance: "loop this song"
    expected_intent: LoopSongOnIntent
    expected_slots: {}

  - utterance: "Repeat the song"
    expected_intent: LoopSongOnIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 2. PlayChannelIntent (channel)
  # -------------------------------------------------------------------------
  - utterance: "Play channel bbc radio"
    expected_intent: PlayChannelIntent
    expected_slots:
      channel: {}

  - utterance: "Play radio jazz fm"
    expected_intent: PlayChannelIntent
    expected_slots:
      channel: {}

  # -------------------------------------------------------------------------
  # 3. PlaySongIntent (song, musician)
  # -------------------------------------------------------------------------
  - utterance: "Play the song bohemian rhapsody"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}

  - utterance: "Play the song hotel california from the eagles"
    expected_intent: PlaySongIntent
    expected_slots:
      song: {}
      musician: {}

  # -------------------------------------------------------------------------
  # 4. PlayAlbumIntent (album, musician)
  # -------------------------------------------------------------------------
  - utterance: "Play the album dark side of the moon"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}

  - utterance: "Play the album thriller by michael jackson"
    expected_intent: PlayAlbumIntent
    expected_slots:
      album: {}
      musician: {}

  # -------------------------------------------------------------------------
  # 5. PlayVideoIntent (title)
  # -------------------------------------------------------------------------
  - utterance: "Play the video star wars"
    expected_intent: PlayVideoIntent
    expected_slots:
      title: {}

  - utterance: "Play the video the matrix"
    expected_intent: PlayVideoIntent
    expected_slots:
      title: {}

  # -------------------------------------------------------------------------
  # 6. PlayArtistSongsIntent (musician)
  # -------------------------------------------------------------------------
  - utterance: "Play songs from queen"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}

  - utterance: "Play music from the beatles"
    expected_intent: PlayArtistSongsIntent
    expected_slots:
      musician: {}

  # -------------------------------------------------------------------------
  # 7. PlayLastAddedIntent (media_type, time_period)
  # -------------------------------------------------------------------------
  # "albums" is not a MediaType value — slot may be empty
  - utterance: "Play last added albums"
    expected_intent: PlayLastAddedIntent
    expected_slots: {}

  - utterance: "Play recently added movies"
    expected_intent: PlayLastAddedIntent
    expected_slots:
      media_type: {}

  - utterance: "Play new media"
    expected_intent: PlayLastAddedIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 8. PlayRandomIntent (media_type, genre)
  # -------------------------------------------------------------------------
  - utterance: "Play a random movie"
    expected_intent: PlayRandomIntent
    expected_slots:
      media_type: {}

  - utterance: "Play something random"
    expected_intent: PlayRandomIntent
    expected_slots: {}

  # "songs" is not a MediaType value — slot may be empty
  - utterance: "Shuffle my songs"
    expected_intent: PlayRandomIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 9. PlayByGenreIntent (genre)
  # -------------------------------------------------------------------------
  - utterance: "Play some rock music"
    expected_intent: PlayByGenreIntent
    expected_slots:
      genre: {}

  - utterance: "Play jazz songs"
    expected_intent: PlayByGenreIntent
    expected_slots:
      genre: {}

  - utterance: "I want to listen to classical"
    expected_intent: PlayByGenreIntent
    expected_slots:
      genre: {}

  # -------------------------------------------------------------------------
  # 10. ContinueWatchingIntent (no slots)
  # -------------------------------------------------------------------------
  - utterance: "Continue watching"
    expected_intent: ContinueWatchingIntent
    expected_slots: {}

  - utterance: "Resume where I left off"
    expected_intent: ContinueWatchingIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 11. GoToChapterIntent (chapter_number)
  # -------------------------------------------------------------------------
  - utterance: "Go to chapter five"
    expected_intent: GoToChapterIntent
    expected_slots:
      chapter_number: {}

  - utterance: "Skip to chapter twelve"
    expected_intent: GoToChapterIntent
    expected_slots:
      chapter_number: {}

  - utterance: "Next chapter"
    expected_intent: GoToChapterIntent
    expected_slots: {}

  # -------------------------------------------------------------------------
  # 12. PlayPlaylistIntent (playlist)
  # -------------------------------------------------------------------------
  - utterance: "Play the playlist my favorites"
    expected_intent: PlayPlaylistIntent
    expected_slots:
      playlist: {}

  - utterance: "Play my playlist road trip"
    expected_intent: PlayPlaylistIntent
