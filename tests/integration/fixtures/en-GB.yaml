  # -------------------------------------------------------------------------
  - utterance: "I like that"
    expected_intent: MarkFavoriteIntent
    expected_slots: {}

  - utterance: "Add the song to my favorites"
    expected_intent: MarkFavoriteIntent
    expected_slots: {}

  - utterance: "I like this song"
    expected_intent: MarkFavoriteIntent
