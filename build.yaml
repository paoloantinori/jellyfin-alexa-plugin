changelog: "Fixed: shuffle mode (AMAZON.ShuffleOn/Off) now actually changes playback order during playlists/queues — it had been setting a flag that the next-track logic never read, so playback stayed in the original order. Shuffle state now lives in one authoritative store and the queue is physically reshuffled (each track once); shuffle-off restores the original order; the shuffle-on response no longer leaks whole-library dynamic entities (issue #10 follow-up, JF-301). Also hardened the account-linking implicit-grant redirect (#11)."
