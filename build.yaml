changelog: "Per-user music delivery setting: choose VideoApp (Echo Show seek bar) or plain AudioPlayer (raw stream, zero transcoding, instant playback) per user. Echo Show music latency fixed: cache-miss songs start in ~2s instead of ~20s (force a video keyframe every 1s so HLS segments form at 4s boundaries; previously the missing keyframe interval produced ~4-minute segments). Single-item video-audio stream-copies MP3/AAC audio (no transcode). Progressive 'searching...' response is now fire-and-forget across all handlers, reducing latency. Fixes: multi-word song titles that miss no longer fuzzy-match an unrelated artist; Alexa slot values/synonyms longer than 140 characters (e.g. musical cast-list artist names) — which crashed every skill request with InvalidResponse — are now truncated (#6, contributed by @DestroyCom)."
