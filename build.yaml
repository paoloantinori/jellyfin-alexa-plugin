changelog: "Fixed: Live TV channels now play on Echo Show — asking for a channel used to display only the channel artwork with no audio or video. Channels now launch via VideoApp.Launch (like movies and episodes) and resolve the correct live stream through Jellyfin's PlaybackInfo (direct-remote HLS for IPTV/M3U sources, dynamic HLS master for tuners), so the Echo Show plays the feed with video and audio. Affects every locale (issue #12)."
