changelog: "Fixed: asking Alexa to play a playlist always reported it as empty, even when the playlist contained tracks that played fine from the Jellyfin web UI (issue #10). Playlist members are now read through Jellyfin's own playlist API (the same one the web UI uses) instead of the album/children query, which returned nothing because playlists store their tracks as linked members rather than as parent-owned items. Affects every locale, not just es-MX. Large playlists also no longer re-scan the whole track list on each continuation batch."
