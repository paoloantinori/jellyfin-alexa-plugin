changelog: "PostPlay AutoPlay: automatically enqueue similar tracks when queue exhausts. Fast/Thorough search mode: per-user speed/recall trade-off. Double Metaphone phonetic matching for non-English artist names. Cross-media-type fallback (song → artist songs). On-the-fly MP4 video generation with album art for Echo Show. APL progress bar with elapsed/total time. Enriched NowPlaying card with artist, album, track number. ShuffleArtistSongs config option. Fix stop/pause routing (ShouldEndSession=true). Fix BrowseLibrary entity resolution for Italian articles. Italian invocation name changed to 'mia collezione'. LWA credential sanitization. 2084 unit tests. 17-locale Mermaid documentation."
