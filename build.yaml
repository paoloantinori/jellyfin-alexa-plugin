changelog: "Fixed: Album playback by voice now works reliably for Italian users. Album names with accents or different spellings (e.g. asking for 'Jazz Cafe' by saying 'jazz caffè') are now found via fuzzy matching. Albums with non-standard folder structures (split discs, special characters) now play completely instead of stopping after a few tracks. The library catalog sync with Alexa now works correctly (was silently failing since the feature was introduced — your albums and artists now populate Alexa's recognition). The skill's authentication token stays fresh automatically, improving reliability of background operations. Italian album commands now understand natural forms like 'metti l'album X' and 'metti il disco X' that previously weren't recognized."
