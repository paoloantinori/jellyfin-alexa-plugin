changelog: "Major matching improvements: if you ask for music by an artist and Alexa mishears it as a mood or search request, the skill now plays the right artist instead of saying 'not found' — in every supported language. Fuzzy and phonetic matching now covers all media types (songs, albums, artists, videos, books, playlists, podcasts, channels), so accented or slightly misspoken names are found. Reliability: audiobook resume positions survive a crash mid-save, and the 'searching…' hint no longer stalls. Security: hardened request validation and the account-linking login page."
