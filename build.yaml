changelog: "Custom invocation names now auto-redeploy to Amazon: changing the skill's wake word in settings triggers a rebuild + redeploy of all 17 locale interaction models (~15-30s) — no Alexa Console edit or re-authorization needed (JF-297). Invocation-name semantics fixed: an empty name means 'use locale defaults' (it-IT 'mia collezione', other locales 'jellyfin player'); a custom name now applies to all 17 locales including it-IT (JF-300). Fixed 'Something went wrong' / 'Qualcosa è andato storto' playing on every track — AudioPlayer event handlers no longer return shouldEndSession=false, which Amazon rejects (JF-299)."
